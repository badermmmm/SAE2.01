<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu de Memory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js" type="module"></script>
</head>
<body>

<!-- FORMULAIRE D'ACCUEIL -->
<div class="formulaire-accueil" id="setup-form">
  <div class="carte-formulaire">
    <div class="entete">
      <div class="logo">🃏</div>
      <h1>Memory</h1>
      <p class="sous-titre">Trouve toutes les paires avant la fin du temps !</p>
    </div>

    <div class="corps-formulaire">
      <!-- Nom du joueur -->
      <div class="champ">
        <label for="player-name">Ton pseudo</label>
        <input
                type="text"
                id="player-name"
                placeholder="Entre ton pseudo..."
                maxlength="20"
                autocomplete="off"
        >
      </div>

      <!-- Niveau de difficulté -->
      <div class="champ">
        <label for="difficulty">Niveau de difficulté</label>
        <div class="conteneur-select">
          <select id="difficulty">
            <option value="4">Facile — 4 paires</option>
            <option value="5">Moyen — 5 paires</option>
            <option value="6" selected>Difficile — 6 paires</option>
            <option value="8">Expert — 8 paires</option>
          </select>
        </div>
      </div>

      <!-- Collection d'images -->
      <div class="champ">
        <label for="collection">Collection d'images</label>
        <div class="conteneur-select">
          <select id="collection">
            <option value="animaux">🐾 Animaux</option>
            <option value="fruits">🍎 Fruits</option>
            <option value="sport">⚽ Sport</option>
          </select>
        </div>
      </div>

      <!-- Bouton de démarrage -->
      <button class="bouton-jouer" id="btn-start">
        <span>Jouer</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>

      <!-- Message d'erreur -->
      <p class="message-erreur" id="error-msg"></p>
    </div>
  </div>
</div>

<!-- ZONE DE JEU (cachée au départ) -->
<div class="zone-de-jeu cache" id="game-area">
  <div class="entete-jeu">
    <div class="infos-joueur">
      <span id="player-display"></span>
      <span id="difficulty-display"></span>
    </div>
    <div class="chronometre" id="timer">⏱ 00:00</div>
    <button class="bouton-abandon" id="btn-abandon">Abandonner</button>
  </div>
  <div class="plateau-de-jeu" id="game-board"></div>
</div>

</body>
</html>
